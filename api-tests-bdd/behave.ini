[behave]
# -----------------------------------------------------------------------------
#  Google-Wallet-PayTrack | Behave BDD configuration
# -----------------------------------------------------------------------------

# Default formatter is the pretty progress one; Allure formatter writes
# results consumed by the Allure report generator.
default_format = pretty
format = pretty
        allure_behave.formatter:AllureFormatter
outfiles = reports/behave-pretty.txt
          reports/allure-results

# Show coloured output, snippet for undefined steps, summary at end.
color = true
show_snippets = true
show_skipped = false
show_timings = true
junit = true
junit_directory = reports/junit
stderr_capture = true
stdout_capture = true
log_capture = true
logging_level = INFO

# -----------------------------------------------------------------------------
#  Tag expressions reference (use via `behave -t @tag`):
#     @smoke       — fast critical-path checks
#     @regression  — full functional sweep
#     @auth        — authentication suite
#     @receipts    — receipt CRUD / upload
#     @rbac        — role-based access control
#     @negative    — error-path scenarios
#     @e2e         — end-to-end journeys
# -----------------------------------------------------------------------------

[behave.userdata]
# Per-run overrides — pick up via behave -D key=value or environment.py
default_environment = dev

[behave.formatters]
allure = allure_behave.formatter:AllureFormatter
