[pytest]
# -----------------------------------------------------------------------------
#  Google-Wallet-PayTrack API Test Suite — pytest configuration
# -----------------------------------------------------------------------------

minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default invocation: HTML report + Allure results + verbose + short tracebacks.
# Override on CLI with `-o addopts=...` or pass extra flags.
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --color=yes
    --maxfail=25
    --durations=10
    --html=reports/html/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --clean-alluredir

# Hard timeout per test (seconds). Use @pytest.mark.timeout(N) to override.
timeout = 60
timeout_method = thread

# Logging — captured per-test, surfaced in failures and Allure attachments.
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-7s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)-7s | %(name)s:%(lineno)d | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# -----------------------------------------------------------------------------
#  Markers — keep alphabetised and document each one.
# -----------------------------------------------------------------------------
markers =
    smoke: Critical-path checks — must pass on every push.
    regression: Full functional regression suite.
    sanity: Build-verification subset, faster than smoke.
    auth: Authentication endpoints (register, login, refresh, logout).
    receipts: Receipt CRUD + upload + retrieval.
    rbac: Role-based access control validation.
    jwt: JWT structure, expiry, signature, tampering.
    db: Database-state validations (post-API).
    health: Liveness / readiness probes.
    e2e: End-to-end user journeys spanning multiple modules.
    negative: Negative / error-path scenarios.
    security: Security-focused checks (injection, headers, CORS).
    slow: Tests longer than 10 seconds.
    flaky: Known-flaky — auto-retried via pytest-rerunfailures.

# -----------------------------------------------------------------------------
#  Filter warnings — keep tests output clean.
# -----------------------------------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning
