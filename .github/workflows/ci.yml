# =============================================================================
#  Google-Wallet-PayTrack — main CI/CD pipeline
#
#  Stages
#  ------
#   1. Static checks      (backend lint + types, frontend lint + types, secrets)
#   2. Unit tests         (backend vitest with coverage, gated at ≥ 80%)
#   3. Integration / API  (pytest API suite + Behave BDD suite, parallel matrix)
#   4. Build              (frontend vite build, backend tsc build)
#   5. Coverage gate      (aggregates all coverage, fails if any < 80%)
#   6. Artefacts          (uploads dist/, coverage reports, Allure, JUnit)
#   7. Deployment build   (Docker images on push-to-main only)
#
#  Concurrency: in-flight runs for the same branch are cancelled — saves
#  CI minutes on rapid pushes.
# =============================================================================

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write     # for coverage comments
  checks: write            # for test annotations

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  COVERAGE_THRESHOLD: "80"

# =============================================================================
#  Jobs
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  #  1. Static checks — fastest signal, runs in parallel for backend + frontend
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend · Lint + Typecheck
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript compile check
        run: npx tsc --noEmit

  frontend-lint:
    name: Frontend · Lint + Typecheck
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript compile check
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  #  Frontend unit tests (Vitest + RTL + MSW)
  # ---------------------------------------------------------------------------
  frontend-unit:
    name: Frontend · Unit tests + coverage
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vitest with coverage (gated at 70 %)
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend
          path: frontend/coverage
          retention-days: 14

      - name: Upload frontend JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-frontend
          path: frontend/reports/junit
          retention-days: 14

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend
          json-summary-path: frontend/coverage/coverage-summary.json
          name: Frontend
        continue-on-error: true

  secret-scan:
    name: Static · Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # warn, don't fail the build (yet)

  # ---------------------------------------------------------------------------
  #  2. Unit tests with coverage (backend)
  # ---------------------------------------------------------------------------
  backend-unit:
    name: Backend · Unit tests + coverage
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults: { run: { working-directory: backend } }

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paytrack
          POSTGRES_PASSWORD: paytrack
          POSTGRES_DB: paytrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U paytrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long-abcdef
      DATABASE_URL: postgresql://paytrack:paytrack@localhost:5432/paytrack_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install coverage provider on demand
        run: npm install --no-save --silent @vitest/coverage-v8@^4.1.5

      - name: Run migrations
        run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env.local
          npx node-pg-migrate --migrations-dir migrations --envPath .env.local up

      - name: Vitest with coverage (gated at ${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          npx vitest run \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=text \
            --coverage.reporter=json-summary \
            --coverage.reporter=lcov \
            --coverage.reporter=html \
            --coverage.reportsDirectory=coverage \
            --coverage.thresholds.lines=${{ env.COVERAGE_THRESHOLD }} \
            --coverage.thresholds.functions=${{ env.COVERAGE_THRESHOLD }} \
            --coverage.thresholds.statements=${{ env.COVERAGE_THRESHOLD }} \
            --coverage.thresholds.branches=70 \
            --reporter=junit \
            --reporter=default \
            --outputFile.junit=reports/junit/backend-unit.xml

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          path: backend/coverage
          retention-days: 14

      - name: Upload backend JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-backend
          path: backend/reports/junit
          retention-days: 14

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: backend
          json-summary-path: backend/coverage/coverage-summary.json
        continue-on-error: true

  # ---------------------------------------------------------------------------
  #  3a. API tests — Pytest suite
  # ---------------------------------------------------------------------------
  api-tests-pytest:
    name: API tests · Pytest (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: backend-unit
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, regression]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paytrack
          POSTGRES_PASSWORD: paytrack
          POSTGRES_DB: paytrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U paytrack"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # Backend boot
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Build & boot backend
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: "5000"
          JWT_SECRET: ci-test-secret-minimum-32-characters-long-abcdef
          DATABASE_URL: postgresql://paytrack:paytrack@localhost:5432/paytrack_test
          REDIS_URL: redis://localhost:6379
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          npm ci
          echo "DATABASE_URL=$DATABASE_URL" > .env.local
          npx node-pg-migrate --migrations-dir migrations --envPath .env.local up
          npm run build
          nohup node dist/index.js > server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health/live && break
            sleep 1
          done

      # Pytest framework
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api-tests/requirements.txt

      - name: Install pytest framework
        working-directory: api-tests
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure environment
        working-directory: api-tests
        run: |
          cp .env.example .env
          sed -i 's|^JWT_SECRET=.*|JWT_SECRET=ci-test-secret-minimum-32-characters-long-abcdef|' .env

      - name: Run ${{ matrix.suite }} suite
        working-directory: api-tests
        env:
          TEST_ENV: dev
        run: |
          if [ "${{ matrix.suite }}" = "smoke" ]; then
            pytest -m smoke -v --reruns=1 --junitxml=reports/junit/pytest.xml
          else
            pytest -n auto --dist=loadfile --reruns=1 --junitxml=reports/junit/pytest.xml
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-pytest-${{ matrix.suite }}
          path: api-tests/reports/allure-results
          retention-days: 14
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: html-pytest-${{ matrix.suite }}
          path: api-tests/reports/html
          retention-days: 14
      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-pytest-${{ matrix.suite }}
          path: api-tests/reports/junit
          retention-days: 14
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log-pytest-${{ matrix.suite }}
          path: backend/server.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  #  3b. API tests — Behave BDD
  # ---------------------------------------------------------------------------
  api-tests-bdd:
    name: API tests · Behave BDD
    runs-on: ubuntu-latest
    needs: backend-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paytrack
          POSTGRES_PASSWORD: paytrack
          POSTGRES_DB: paytrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U paytrack"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build & boot backend
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: "5000"
          JWT_SECRET: ci-test-secret-minimum-32-characters-long-abcdef
          DATABASE_URL: postgresql://paytrack:paytrack@localhost:5432/paytrack_test
          REDIS_URL: redis://localhost:6379
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          npm ci
          echo "DATABASE_URL=$DATABASE_URL" > .env.local
          npx node-pg-migrate --migrations-dir migrations --envPath .env.local up
          npm run build
          nohup node dist/index.js > server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:5000/health/live && break; sleep 1; done

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api-tests-bdd/requirements.txt

      - name: Install BDD framework
        working-directory: api-tests-bdd
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure environment
        working-directory: api-tests-bdd
        run: |
          cp .env.example .env
          sed -i 's|^JWT_SECRET=.*|JWT_SECRET=ci-test-secret-minimum-32-characters-long-abcdef|' .env

      - name: Behave dry-run (parse check)
        working-directory: api-tests-bdd
        run: behave --dry-run --no-snippets --no-summary

      - name: Run smoke scenarios
        working-directory: api-tests-bdd
        run: behave -t @smoke

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-bdd
          path: api-tests-bdd/reports/allure-results
          retention-days: 14
      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-bdd
          path: api-tests-bdd/reports/junit
          retention-days: 14

  # ---------------------------------------------------------------------------
  #  4. Build (frontend + backend)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-unit]
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 14

  backend-build:
    name: Backend · Build
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Compile TypeScript
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 14

  # ---------------------------------------------------------------------------
  #  5. Dependency audits — non-blocking warnings
  # ---------------------------------------------------------------------------
  audit:
    name: Security · Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Backend npm audit
        working-directory: backend
        run: npm audit --production --audit-level=high
        continue-on-error: true
      - name: Frontend npm audit
        working-directory: frontend
        run: npm audit --production --audit-level=high
        continue-on-error: true
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Python audit (api-tests)
        run: |
          pip install pip-audit
          pip-audit --requirement api-tests/requirements.txt
        continue-on-error: true

  # ---------------------------------------------------------------------------
  #  6. Coverage gate — verifies summary thresholds independently of vitest
  # ---------------------------------------------------------------------------
  coverage-gate:
    name: Coverage gate (≥ ${{ env.COVERAGE_THRESHOLD }}%)
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-backend
          path: coverage-backend
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: coverage-frontend

      - name: Enforce thresholds (backend ≥ 80 %, frontend ≥ 70 %)
        run: |
          set -e
          python3 - <<'PY'
          import json, sys

          gates = [
              ("backend",  "coverage-backend/coverage-summary.json",  80, 80, 80, 70),
              ("frontend", "coverage-frontend/coverage-summary.json", 70, 70, 70, 70),
          ]

          failed = []
          for name, path, lines_th, stmts_th, fns_th, branches_th in gates:
              try:
                  totals = json.load(open(path))["total"]
              except FileNotFoundError:
                  print(f"::error::coverage-summary.json missing for {name} at {path}")
                  failed.append((name, "missing summary", 0, 0))
                  continue

              checks = [
                  ("lines",      totals["lines"]["pct"],      lines_th),
                  ("statements", totals["statements"]["pct"], stmts_th),
                  ("functions",  totals["functions"]["pct"],  fns_th),
                  ("branches",   totals["branches"]["pct"],   branches_th),
              ]
              print(f"\n{name.upper()}:")
              for metric, pct, th in checks:
                  status = "PASS" if pct >= th else "FAIL"
                  print(f"  {metric:11s} {pct:6.2f}%   threshold {th:>2}%   {status}")
                  if pct < th:
                      failed.append((name, metric, pct, th))

          if failed:
              for name, metric, pct, th in failed:
                  print(f"::error::Coverage gate FAILED — {name}.{metric}: {pct:.2f}% < {th}%")
              sys.exit(1)
          print("\n::notice::All coverage gates passed.")
          PY

  # ---------------------------------------------------------------------------
  #  7. Aggregate Allure report (post-test, non-blocking convenience)
  # ---------------------------------------------------------------------------
  aggregate-allure:
    name: Reporting · Allure aggregate
    runs-on: ubuntu-latest
    needs: [api-tests-pytest, api-tests-bdd]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: allure-inputs
          pattern: allure-*
          merge-multiple: false

      - name: Install Allure CLI
        run: |
          curl -sLO https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
          tar -xzf allure-2.30.0.tgz
          echo "$PWD/allure-2.30.0/bin" >> $GITHUB_PATH

      - name: Generate aggregate report
        run: |
          mkdir -p allure-merged
          for dir in allure-inputs/allure-*; do
            cp -r "$dir"/* allure-merged/ 2>/dev/null || true
          done
          allure generate allure-merged -o allure-report --clean

      - uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

  # ---------------------------------------------------------------------------
  #  8. Deployment build — Docker image, push only on main
  # ---------------------------------------------------------------------------
  docker-build:
    name: Deployment · Docker image
    runs-on: ubuntu-latest
    needs: [coverage-gate, api-tests-pytest, api-tests-bdd, frontend-build, backend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: |
            paytrack-backend:${{ github.sha }}
            paytrack-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/paytrack-backend.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image-backend
          path: /tmp/paytrack-backend.tar
          retention-days: 7

  # ---------------------------------------------------------------------------
  #  9. Final gate — required check that the whole pipeline passed
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI · Success gate
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - frontend-lint
      - backend-unit
      - frontend-unit
      - backend-build
      - frontend-build
      - api-tests-pytest
      - api-tests-bdd
      - coverage-gate
    if: always()
    steps:
      - name: Verify all gates passed
        run: |
          if [[ "${{ needs.backend-lint.result }}"   != "success" || \
                "${{ needs.frontend-lint.result }}"  != "success" || \
                "${{ needs.backend-unit.result }}"   != "success" || \
                "${{ needs.frontend-unit.result }}"  != "success" || \
                "${{ needs.backend-build.result }}"  != "success" || \
                "${{ needs.frontend-build.result }}" != "success" || \
                "${{ needs.api-tests-pytest.result }}" != "success" || \
                "${{ needs.api-tests-bdd.result }}" != "success" || \
                "${{ needs.coverage-gate.result }}" != "success" ]]; then
            echo "::error::One or more required gates failed."
            exit 1
          fi
          echo "::notice::All CI gates passed."
